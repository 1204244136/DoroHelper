name: Compile AHK 2.0 and Release

on:
  push:
    tags:
      - "v**"
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest # AutoHotkey 和 Ahk2Exe 在 Windows 上运行
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download and Setup AutoHotkey v2
        shell: pwsh
        run: |
          # 使用 GitHub Releases 的稳定下载链接，避免 Cloudflare
          # 请务必检查 AutoHotkey 的 GitHub Releases 页面，获取最新的稳定版本链接
          # 例如：https://github.com/AutoHotkey/AutoHotkey/releases/tag/v2.0.19
          # 找到对应的 .zip 文件下载链接
          $ahkZipUrl = "https://github.com/AutoHotkey/AutoHotkey/releases/download/v2.0.19/AutoHotkey_2.0.19.zip" 
          $ahkExtractPath = "AutoHotkey_v2_Files"
          Write-Host "Downloading AutoHotkey v2 from $ahkZipUrl"
          Invoke-WebRequest -Uri $ahkZipUrl -OutFile "ahk-v2.zip"
          Write-Host "Extracting AutoHotkey v2 to $ahkExtractPath"
          Expand-Archive -Path "ahk-v2.zip" -DestinationPath $ahkExtractPath -Force

          # 打印解压后的文件结构，以便调试 Ahk2Exe 和基础 exe 的路径
          Write-Host "Listing contents of $ahkExtractPath after extraction:"
          Get-ChildItem -Path $ahkExtractPath -Recurse | Select-Object FullName, Name, DirectoryName | Sort-Object FullName

          # 根据解压后的目录结构，将 Ahk2Exe 和基础 exe 所在的目录添加到 PATH
          # 假设 Ahk2Exe 在 AutoHotkey_v2_Files\Compiler 或 AutoHotkey_v2_Files 根目录
          # 假设 AutoHotkey 解释器在 AutoHotkey_v2_Files 或 AutoHotkey_v2_Files\UX 目录

          # 首先尝试将 Ahk2Exe 的可能路径添加到 PATH
          $Ahk2ExePathCandidate1 = Join-Path $PWD $ahkExtractPath "Compiler"
          $Ahk2ExePathCandidate2 = Join-Path $PWD $ahkExtractPath 

          if (Test-Path "$Ahk2ExePathCandidate1\Ahk2Exe.exe") {
              Write-Host "Adding $Ahk2ExePathCandidate1 to PATH"
              Add-Content $env:GITHUB_PATH "$Ahk2ExePathCandidate1"
          } elseif (Test-Path "$Ahk2ExePathCandidate2\Ahk2Exe.exe") {
              Write-Host "Adding $Ahk2ExePathCandidate2 to PATH"
              Add-Content $env:GITHUB_PATH "$Ahk2ExePathCandidate2"
          } else {
              Write-Error "Ahk2Exe.exe not found in expected paths. Check extraction."
              exit 1
          }

          # 验证 Ahk2Exe.exe 是否在 PATH 中
          Write-Host "Verifying Ahk2Exe command..."
          if (-not (Get-Command Ahk2Exe -ErrorAction SilentlyContinue)) {
            Write-Error "Ahk2Exe.exe not found in PATH. Please check extraction and PATH setup."
            Write-Host "Current PATH: $env:PATH"
            exit 1
          }
          Write-Host "Ahk2Exe found in PATH at: $((Get-Command Ahk2Exe).Path)"

      - name: Extract Version from AHK script
        id: get_version
        shell: pwsh
        run: |
          $scriptPath = "DoroHelper.ahk"
          if (-not (Test-Path $scriptPath)) {
            Write-Error "Script file '$scriptPath' not found."
            exit 1
          }
          $content = Get-Content -Path $scriptPath -Raw
          # 匹配 currentVersion := "v1.0.0-beta" 这样的格式
          $match = $content | Select-String -Pattern 'currentVersion\s*:=\s*"([^"]+)"'
          if ($match) {
            $version = $match.Matches[0].Groups[1].Value
            Write-Host "Version found: $version"
            echo "VERSION_TAG=$version" >> $env:GITHUB_OUTPUT
          } else {
            Write-Error "Version pattern (currentVersion := \"...\") not found in $scriptPath"
            exit 1
          }

      - name: Compile AutoHotkey Script
        id: compile_script
        shell: pwsh
        run: |
          $ahkExtractPath = "AutoHotkey_v2_Files" # 与上面解压路径一致
          $scriptFile = "DoroHelper.ahk"
          $iconFile = "doro.ico"
          $outputExe = "DoroHelper.exe" # 输出的 exe 文件名

          if (-not (Test-Path $scriptFile)) {
            Write-Error "AHK script file '$scriptFile' not found."
            exit 1
          }
          if (-not (Test-Path $iconFile)) {
            Write-Warning "Icon file '$iconFile' not found. Proceeding without custom icon."
            $iconFile = "" # 如果图标不存在，则不使用图标参数
          }

          # 确定用于编译的64位基础二进制文件路径
          # 根据 AutoHotkey v2.0.19.zip 的内容，通常是 AutoHotkey64.exe 或 AutoHotkeyU64.exe
          # 在 AutoHotkey_v2_Files 或 AutoHotkey_v2_Files\UX 目录下
          $baseBinaryName = "AutoHotkey64.exe"
          $baseBinaryPath = Join-Path $PWD $ahkExtractPath $baseBinaryName
          if (-not (Test-Path $baseBinaryPath)) {
              $baseBinaryPath = Join-Path $PWD $ahkExtractPath "UX" $baseBinaryName # 检查 UX 子目录
              if (-not (Test-Path $baseBinaryPath)) {
                  # 如果 AutoHotkey64.exe 未找到，尝试 AutoHotkeyU64.exe
                  $baseBinaryName = "AutoHotkeyU64.exe"
                  $baseBinaryPath = Join-Path $PWD $ahkExtractPath $baseBinaryName
                   if (-not (Test-Path $baseBinaryPath)) {
                        $baseBinaryPath = Join-Path $PWD $ahkExtractPath "UX" $baseBinaryName # 检查 UX 子目录
                        if (-not (Test-Path $baseBinaryPath)) {
                            Write-Error "Could not find a suitable 64-bit base binary (AutoHotkey64.exe or AutoHotkeyU64.exe) in '$ahkExtractPath' or '$($ahkExtractPath)\UX'."
                            Write-Host "Listing contents of ${ahkExtractPath}:"
                            Get-ChildItem -Path (Join-Path $PWD $ahkExtractPath) -Recurse | Select-Object FullName
                            exit 1
                        }
                   }
              }
          }

          Write-Host "Using Ahk2Exe from PATH."
          Write-Host "Script: $scriptFile"
          Write-Host "Output: $outputExe"
          Write-Host "Icon: $iconFile"
          Write-Host "Base Binary for compilation: $baseBinaryPath"

          $compileArgs = @("/in", "`"$scriptFile`"", "/out", "`"$outputExe`"", "/bin", "`"$baseBinaryPath`"", "/cp", "65001") # UTF-8 codepage
          if ($iconFile -and (Test-Path $iconFile)) {
              $compileArgs += @("/icon", "`"$iconFile`"")
          }

          Ahk2Exe.exe $compileArgs

          if (-not (Test-Path $outputExe)) {
            Write-Error "Compilation failed. $outputExe not found."
            exit 1
          }
          Write-Host "$outputExe compiled successfully."
          echo "EXE_NAME=$outputExe" >> $env:GITHUB_OUTPUT

      - name: Determine if Pre-release
        id: prerelease_check
        shell: bash # bash 更易于进行字符串检查
        run: |
          VERSION_TAG="${{ steps.get_version.outputs.VERSION_TAG }}"
          IS_PRERELEASE="false"
          if [[ "$VERSION_TAG" == *beta* ]]; then
            IS_PRERELEASE="true"
          fi
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION_TAG, Is Prerelease: $IS_PRERELEASE"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION_TAG }}
          name: ${{ steps.get_version.outputs.VERSION_TAG }} # Release 标题
          body: |
            Automated release for DoroHelper ${{ steps.get_version.outputs.VERSION_TAG }}
            Compiled from commit ${{ github.sha }}
          draft: false
          prerelease: ${{ steps.prerelease_check.outputs.IS_PRERELEASE }}
          files: |
            ${{ steps.compile_script.outputs.EXE_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
