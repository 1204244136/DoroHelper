name: Compile AHK 2.0 and Release

on:
  push:
    tags:
      - "v**"
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest # AutoHotkey 和 Ahk2Exe 在 Windows 上运行
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install AutoHotkey v2 and Setup Ahk2Exe
        shell: pwsh
        run: |
          Write-Host "Attempting to uninstall any existing Chocolatey AutoHotkey packages..."
          # It's okay if these fail if the packages aren't installed.
          choco uninstall autohotkey -y --remove-dependencies -nfy         || Write-Warning "Uninstall of autohotkey (choco package) skipped or failed, continuing..."
          choco uninstall autohotkey.install -y --remove-dependencies -nfy || Write-Warning "Uninstall of autohotkey.install skipped or failed, continuing..."
          choco uninstall autohotkey.v1 -y --remove-dependencies -nfy      || Write-Warning "Uninstall of autohotkey.v1 skipped or failed, continuing..."

          # Define custom installation directory for AHK v2
          $ahkCustomInstallDir = "$env:ProgramData\AutoHotkey_v2_Custom" # Using ProgramData to avoid permission issues and for clarity
          $ahkDownloadUrl = "https://www.autohotkey.com/download/ahk-v2.zip" # Official link for latest v2 zip
          $ahkZipPath = Join-Path $env:TEMP "ahk-v2.zip"

          Write-Host "Ensuring clean state for custom AutoHotkey v2 installation directory: $ahkCustomInstallDir"
          if (Test-Path $ahkCustomInstallDir) {
            Write-Host "Removing existing directory: $ahkCustomInstallDir"
            Remove-Item -Recurse -Force $ahkCustomInstallDir -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 3 # Give FS time
          }
          New-Item -ItemType Directory -Path $ahkCustomInstallDir -Force | Out-Null

          Write-Host "Downloading AutoHotkey v2 from '$ahkDownloadUrl' to '$ahkZipPath'..."
          try {
            Invoke-WebRequest -Uri $ahkDownloadUrl -OutFile $ahkZipPath -UseBasicParsing -TimeoutSec 300
            Write-Host "Download complete."
          } catch {
            Write-Error "Failed to download AutoHotkey v2: $($_.Exception.Message)"
            exit 1
          }

          Write-Host "Extracting '$ahkZipPath' to '$ahkCustomInstallDir'..."
          try {
            Expand-Archive -Path $ahkZipPath -DestinationPath $ahkCustomInstallDir -Force
            Write-Host "Extraction complete."
          } catch {
            Write-Error "Failed to extract AutoHotkey v2 zip: $($_.Exception.Message)"
            exit 1
          }

          # Verify extraction
          if (-not (Test-Path (Join-Path $ahkCustomInstallDir "AutoHotkey64.exe"))) { # A common v2 exe name
             Write-Error "Key AutoHotkey v2 files not found in $ahkCustomInstallDir after extraction. Listing contents:"
             Get-ChildItem -Path $ahkCustomInstallDir -Recurse
             exit 1
          }

          Write-Host "Listing all EXE files in AutoHotkey v2 custom installation directory '$ahkCustomInstallDir' with version info:"
          Get-ChildItem -Path $ahkCustomInstallDir -Filter "*.exe" -Recurse | ForEach-Object {
            $versionInfo = "N/A"
            try { $versionInfo = $_.VersionInfo.ProductVersion } catch {}
            [PSCustomObject]@{
                Name = $_.Name
                FullName = $_.FullName
                Length = $_.Length
                ProductVersion = $versionInfo
                LastWriteTime = $_.LastWriteTime
            }
          } | Format-Table -AutoSize

          # Find a suitable AutoHotkey v2 executable within the custom directory
          $ahkExePathToUse = ""
          # Prefer 64-bit, then 32-bit v2 executables from the root of the custom install dir
          $v2ExeCandidatesInOrder = @(
            Join-Path $ahkCustomInstallDir "AutoHotkey64.exe"
            Join-Path $ahkCustomInstallDir "AutoHotkeyUX.exe" # Some v2 distributions use this.
            Join-Path $ahkCustomInstallDir "AutoHotkey.exe"   # If it's v2
            Join-Path $ahkCustomInstallDir "AutoHotkey32.exe"
          )

          Write-Host "Evaluating potential AutoHotkey v2 executables from '$ahkCustomInstallDir':"
          foreach ($candidatePath in $v2ExeCandidatesInOrder) {
              if (-not (Test-Path $candidatePath)) {
                  # Write-Host "Candidate '$candidatePath' does not exist, skipping." # Can be verbose
                  continue
              }
              Write-Host "Checking candidate: '$candidatePath'"
              $fileProductVersion = ""
              try {
                  $fileProductVersion = (Get-Item $candidatePath).VersionInfo.ProductVersion
              } catch {
                  Write-Warning "Could not retrieve ProductVersion for '$candidatePath'."
                  Continue
              }

              Write-Host "ProductVersion for '$candidatePath' is '$fileProductVersion'."
              if ($fileProductVersion -and $fileProductVersion.StartsWith("2.")) {
                  Write-Host "'$candidatePath' IS AutoHotkey v2 (ProductVersion: $fileProductVersion)."
                  $ahkExePathToUse = $candidatePath
                  break # Found a suitable v2 executable
              } else {
                  Write-Warning "'$candidatePath' (ProductVersion: $fileProductVersion) does NOT appear to be a v2 executable."
              }
          }

          if (-not $ahkExePathToUse) {
              Write-Error "Could not find a confirmed AutoHotkey v2 executable in '$ahkCustomInstallDir' after checking candidates. Please review the EXE listing above."
              exit 1
          }
          Write-Host "DEFINITIVELY Using AutoHotkey v2 executable: '$ahkExePathToUse'"

          $chosenAhkDir = Split-Path $ahkExePathToUse -Parent # This will be $ahkCustomInstallDir
          Write-Host "Adding AutoHotkey v2 directory '$chosenAhkDir' to PATH for this session."
          $env:PATH = "$chosenAhkDir;" + $env:PATH

          # Paths for install-ahk2exe.ahk and Compiler relative to our custom install directory
          $installScriptDir = Join-Path $ahkCustomInstallDir "UX"
          $installScriptName = "install-ahk2exe.ahk"
          $installScriptFullPath = Join-Path $installScriptDir $installScriptName

          $ahk2ExeCompilerDir = Join-Path $ahkCustomInstallDir "Compiler"
          $ahk2ExeFinalPath = Join-Path $ahk2ExeCompilerDir "Ahk2Exe.exe"

          if (Test-Path $installScriptFullPath) {
            Write-Host "Found '$installScriptName'. Running it with the selected v2 executable '$ahkExePathToUse'..."
            Push-Location $installScriptDir
            & $ahkExePathToUse /ErrorStdOut $installScriptName
            $exitCode = $LASTEXITCODE
            Pop-Location
            
            if ($exitCode -ne 0) {
                Write-Warning "'$installScriptName' execution may have failed with exit code $exitCode."
            } else {
                Write-Host "'$installScriptName' executed, exit code $exitCode."
            }

            Write-Host "Waiting for Ahk2Exe installation/download (up to 30 seconds)..."
            Start-Sleep -Seconds 30

            if (Test-Path $ahk2ExeFinalPath) {
              Write-Host "Ahk2Exe.exe CONFIRMED at '$ahk2ExeFinalPath'."
            } else {
              Write-Error "Ahk2Exe.exe was NOT found at '$ahk2ExeFinalPath' after running '$installScriptName'."
              Write-Host "Listing contents of Compiler directory '$ahk2ExeCompilerDir' (if it exists):"
              if (Test-Path $ahk2ExeCompilerDir) { Get-ChildItem -Path $ahk2ExeCompilerDir -Recurse } else { Write-Host "Directory does not exist."}
              exit 1
            }
          } else {
            Write-Error "'$installScriptFullPath' NOT found. Cannot setup Ahk2Exe."
            Write-Host "Listing contents of UX directory '$installScriptDir' (if it exists):"
            if (Test-Path $installScriptDir) { Get-ChildItem -Path $installScriptDir -Recurse } else { Write-Host "Directory does not exist."}
            Write-Host "Listing contents of AHK custom root directory '$ahkCustomInstallDir' (if it exists):"
            if (Test-Path $ahkCustomInstallDir) { Get-ChildItem -Path $ahkCustomInstallDir -Recurse -Depth 2} else { Write-Host "Directory does not exist."}
            exit 1
          }

          if (Test-Path $ahk2ExeFinalPath) {
            Write-Host "Adding AutoHotkey Compiler directory '$ahk2ExeCompilerDir' to PATH for this session."
            $env:PATH = "$ahk2ExeCompilerDir;" + $env:PATH
          }

          Write-Host "Final session PATH: $env:PATH"
          Start-Sleep -Milliseconds 500

          $chosenAhkExeName = Split-Path $ahkExePathToUse -Leaf
          Write-Host "Verifying selected AutoHotkey command '$chosenAhkExeName'..."
          $ahkCmdInfo = Get-Command $chosenAhkExeName -ErrorAction SilentlyContinue
          if (-not $ahkCmdInfo) {
            Write-Error "$chosenAhkExeName not found using Get-Command. PATH: $env:PATH"
            exit 1
          }
          Write-Host "$chosenAhkExeName found at: $($ahkCmdInfo.Source)"

          Write-Host "Verifying Ahk2Exe command..."
          $ahk2ExeCmdInfo = Get-Command Ahk2Exe -ErrorAction SilentlyContinue
          if (-not $ahk2ExeCmdInfo) {
            Write-Error "Ahk2Exe.exe not found using Get-Command. PATH: $env:PATH"
            exit 1
          }
          Write-Host "Ahk2Exe found at: $($ahk2ExeCmdInfo.Source)"
          Write-Host "AutoHotkey v2 and Ahk2Exe setup complete."

      - name: Compile AutoHotkey Script
        id: compile_script
        shell: pwsh
        run: |
          $ahkExtractPath = "AutoHotkey_v2_Files" # 与上面解压路径一致
          $scriptFile = "DoroHelper.ahk"
          $iconFile = "doro.ico"
          $outputExe = "DoroHelper.exe" # 输出的 exe 文件名

          if (-not (Test-Path $scriptFile)) {
            Write-Error "AHK script file '$scriptFile' not found."
            exit 1
          }
          if (-not (Test-Path $iconFile)) {
            Write-Warning "Icon file '$iconFile' not found. Proceeding without custom icon."
            $iconFile = "" # 如果图标不存在，则不使用图标参数
          }

          # 确定用于编译的64位基础二进制文件路径
          # 根据 AutoHotkey v2.0.19.zip 的内容，通常是 AutoHotkey64.exe 或 AutoHotkeyU64.exe
          # 在 AutoHotkey_v2_Files 或 AutoHotkey_v2_Files\UX 目录下
          $baseBinaryName = "AutoHotkey64.exe"
          $baseBinaryPath = Join-Path $PWD $ahkExtractPath $baseBinaryName
          if (-not (Test-Path $baseBinaryPath)) {
              $baseBinaryPath = Join-Path $PWD $ahkExtractPath "UX" $baseBinaryName # 检查 UX 子目录
              if (-not (Test-Path $baseBinaryPath)) {
                  # 如果 AutoHotkey64.exe 未找到，尝试 AutoHotkeyU64.exe
                  $baseBinaryName = "AutoHotkeyU64.exe"
                  $baseBinaryPath = Join-Path $PWD $ahkExtractPath $baseBinaryName
                   if (-not (Test-Path $baseBinaryPath)) {
                        $baseBinaryPath = Join-Path $PWD $ahkExtractPath "UX" $baseBinaryName # 检查 UX 子目录
                        if (-not (Test-Path $baseBinaryPath)) {
                            Write-Error "Could not find a suitable 64-bit base binary (AutoHotkey64.exe or AutoHotkeyU64.exe) in '$ahkExtractPath' or '$($ahkExtractPath)\UX'."
                            Write-Host "Listing contents of ${ahkExtractPath}:"
                            Get-ChildItem -Path (Join-Path $PWD $ahkExtractPath) -Recurse | Select-Object FullName
                            exit 1
                        }
                   }
              }
          }

          Write-Host "Using Ahk2Exe from PATH."
          Write-Host "Script: $scriptFile"
          Write-Host "Output: $outputExe"
          Write-Host "Icon: $iconFile"
          Write-Host "Base Binary for compilation: $baseBinaryPath"

          $compileArgs = @("/in", "`"$scriptFile`"", "/out", "`"$outputExe`"", "/bin", "`"$baseBinaryPath`"", "/cp", "65001") # UTF-8 codepage
          if ($iconFile -and (Test-Path $iconFile)) {
              $compileArgs += @("/icon", "`"$iconFile`"")
          }

          Ahk2Exe.exe $compileArgs

          if (-not (Test-Path $outputExe)) {
            Write-Error "Compilation failed. $outputExe not found."
            exit 1
          }
          Write-Host "$outputExe compiled successfully."
          echo "EXE_NAME=$outputExe" >> $env:GITHUB_OUTPUT

      - name: Determine if Pre-release
        id: prerelease_check
        shell: bash # bash 更易于进行字符串检查
        run: |
          VERSION_TAG="${{ steps.get_version.outputs.VERSION_TAG }}"
          IS_PRERELEASE="false"
          if [[ "$VERSION_TAG" == *beta* ]]; then
            IS_PRERELEASE="true"
          fi
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION_TAG, Is Prerelease: $IS_PRERELEASE"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION_TAG }}
          name: ${{ steps.get_version.outputs.VERSION_TAG }} # Release 标题
          body: |
            Automated release for DoroHelper ${{ steps.get_version.outputs.VERSION_TAG }}
            Compiled from commit ${{ github.sha }}
          draft: false
          prerelease: ${{ steps.prerelease_check.outputs.IS_PRERELEASE }}
          files: |
            ${{ steps.compile_script.outputs.EXE_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
