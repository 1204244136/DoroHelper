name: Compile AHK 2.0 and Release

on:
  push:
    tags:
      - "v**"
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest # AutoHotkey 和 Ahk2Exe 在 Windows 上运行
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install AutoHotkey v2 using Chocolatey
        shell: pwsh
        run: |
          Write-Host "Installing AutoHotkey via Chocolatey..."
          choco install autohotkey -y --no-progress # 使用 autohotkey 包, --no-progress 减少日志输出

          Write-Host "Listing contents of suspected AutoHotkey installation directory for verification..."
          $ahkInstallDirRoot = "$env:ProgramFiles\AutoHotkey"
          if (Test-Path $ahkInstallDirRoot) {
            Get-ChildItem -Path $ahkInstallDirRoot -Recurse -Depth 2 | Select-Object FullName, Length
          } else {
            Write-Warning "AutoHotkey installation directory '$ahkInstallDirRoot' not found for listing. This might indicate an installation issue."
          }

          # 统一处理 PATH，将需要的目录都加到前面，避免重复判断和添加
          $ahkCorePath = "$env:ProgramFiles\AutoHotkey"
          $ahkUxPathDir = Join-Path $ahkCorePath "UX"

          Write-Host "Ensuring AutoHotkey directories are in PATH for this session..."
          $originalPath = $env:PATH
          $pathsToAdd = New-Object System.Collections.Generic.List[string]

          if (Test-Path $ahkCorePath) {
              $pathsToAdd.Add($ahkCorePath)
          }
          if (Test-Path $ahkUxPathDir) {
              $pathsToAdd.Add($ahkUxPathDir)
          }

          # 去重并添加到PATH头部
          $uniquePathsToAdd = $pathsToAdd | Select-Object -Unique
          foreach ($p in $uniquePathsToAdd) {
              if (-not ($originalPath -split ';' -contains $p)) {
                  $env:PATH = "$p;" + $env:PATH
                  Write-Host "Added '$p' to session PATH."
              }
          }
          Write-Host "Updated session PATH: $env:PATH"
          Start-Sleep -Milliseconds 500 # 短暂等待，确保PATH更新被shell感知

          # 验证 AutoHotkey.exe (v2)
          Write-Host "Verifying AutoHotkey command after PATH adjustment..."
          if (-not (Get-Command AutoHotkey -ErrorAction SilentlyContinue)) {
            Write-Error "AutoHotkey.exe still not found in PATH after attempting to add '$ahkCorePath'."
            Write-Host "Listing contents of '$ahkCorePath' (if it exists):"
            if(Test-Path $ahkCorePath) { Get-ChildItem -Path $ahkCorePath }
            exit 1
          }
          Write-Host "AutoHotkey found in PATH at: $((Get-Command AutoHotkey).Path)"

          # 验证 Ahk2Exe.exe
          Write-Host "Verifying Ahk2Exe command after PATH adjustment..."
          if (-not (Get-Command Ahk2Exe -ErrorAction SilentlyContinue)) {
            # Ahk2Exe 可能在 UX 目录，也可能（较少见）在核心目录
            Write-Error "Ahk2Exe.exe still not found in PATH after attempting to add '$ahkUxPathDir' (and potentially '$ahkCorePath')."
            Write-Host "Listing contents of '$ahkUxPathDir' (if it exists):"
            if(Test-Path $ahkUxPathDir) { Get-ChildItem -Path $ahkUxPathDir }
            Write-Host "Listing contents of '$ahkCorePath' for Ahk2Exe (if it exists):"
            if(Test-Path $ahkCorePath) { Get-ChildItem -Path $ahkCorePath -Filter "Ahk2Exe.exe" }
            exit 1
          }
          Write-Host "Ahk2Exe found in PATH at: $((Get-Command Ahk2Exe).Path)"

      - name: Compile AutoHotkey Script
        id: compile_script
        shell: pwsh
        run: |
          $ahkExtractPath = "AutoHotkey_v2_Files" # 与上面解压路径一致
          $scriptFile = "DoroHelper.ahk"
          $iconFile = "doro.ico"
          $outputExe = "DoroHelper.exe" # 输出的 exe 文件名

          if (-not (Test-Path $scriptFile)) {
            Write-Error "AHK script file '$scriptFile' not found."
            exit 1
          }
          if (-not (Test-Path $iconFile)) {
            Write-Warning "Icon file '$iconFile' not found. Proceeding without custom icon."
            $iconFile = "" # 如果图标不存在，则不使用图标参数
          }

          # 确定用于编译的64位基础二进制文件路径
          # 根据 AutoHotkey v2.0.19.zip 的内容，通常是 AutoHotkey64.exe 或 AutoHotkeyU64.exe
          # 在 AutoHotkey_v2_Files 或 AutoHotkey_v2_Files\UX 目录下
          $baseBinaryName = "AutoHotkey64.exe"
          $baseBinaryPath = Join-Path $PWD $ahkExtractPath $baseBinaryName
          if (-not (Test-Path $baseBinaryPath)) {
              $baseBinaryPath = Join-Path $PWD $ahkExtractPath "UX" $baseBinaryName # 检查 UX 子目录
              if (-not (Test-Path $baseBinaryPath)) {
                  # 如果 AutoHotkey64.exe 未找到，尝试 AutoHotkeyU64.exe
                  $baseBinaryName = "AutoHotkeyU64.exe"
                  $baseBinaryPath = Join-Path $PWD $ahkExtractPath $baseBinaryName
                   if (-not (Test-Path $baseBinaryPath)) {
                        $baseBinaryPath = Join-Path $PWD $ahkExtractPath "UX" $baseBinaryName # 检查 UX 子目录
                        if (-not (Test-Path $baseBinaryPath)) {
                            Write-Error "Could not find a suitable 64-bit base binary (AutoHotkey64.exe or AutoHotkeyU64.exe) in '$ahkExtractPath' or '$($ahkExtractPath)\UX'."
                            Write-Host "Listing contents of ${ahkExtractPath}:"
                            Get-ChildItem -Path (Join-Path $PWD $ahkExtractPath) -Recurse | Select-Object FullName
                            exit 1
                        }
                   }
              }
          }

          Write-Host "Using Ahk2Exe from PATH."
          Write-Host "Script: $scriptFile"
          Write-Host "Output: $outputExe"
          Write-Host "Icon: $iconFile"
          Write-Host "Base Binary for compilation: $baseBinaryPath"

          $compileArgs = @("/in", "`"$scriptFile`"", "/out", "`"$outputExe`"", "/bin", "`"$baseBinaryPath`"", "/cp", "65001") # UTF-8 codepage
          if ($iconFile -and (Test-Path $iconFile)) {
              $compileArgs += @("/icon", "`"$iconFile`"")
          }

          Ahk2Exe.exe $compileArgs

          if (-not (Test-Path $outputExe)) {
            Write-Error "Compilation failed. $outputExe not found."
            exit 1
          }
          Write-Host "$outputExe compiled successfully."
          echo "EXE_NAME=$outputExe" >> $env:GITHUB_OUTPUT

      - name: Determine if Pre-release
        id: prerelease_check
        shell: bash # bash 更易于进行字符串检查
        run: |
          VERSION_TAG="${{ steps.get_version.outputs.VERSION_TAG }}"
          IS_PRERELEASE="false"
          if [[ "$VERSION_TAG" == *beta* ]]; then
            IS_PRERELEASE="true"
          fi
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION_TAG, Is Prerelease: $IS_PRERELEASE"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION_TAG }}
          name: ${{ steps.get_version.outputs.VERSION_TAG }} # Release 标题
          body: |
            Automated release for DoroHelper ${{ steps.get_version.outputs.VERSION_TAG }}
            Compiled from commit ${{ github.sha }}
          draft: false
          prerelease: ${{ steps.prerelease_check.outputs.IS_PRERELEASE }}
          files: |
            ${{ steps.compile_script.outputs.EXE_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
