name: Compile AHK 2.0 and Release

on:
  push:
    tags:
      - "v**"
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest # AutoHotkey 和 Ahk2Exe 在 Windows 上运行
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install AutoHotkey and Setup Ahk2Exe
        shell: pwsh
        run: |
          Write-Host "Installing AutoHotkey via Chocolatey..."
          choco install autohotkey -y --no-progress

          $ahkInstallDir = "$env:ProgramFiles\AutoHotkey"
          Write-Host "AutoHotkey nominal installation directory: $ahkInstallDir"

          if (-not (Test-Path $ahkInstallDir)) {
            Write-Error "AutoHotkey installation directory '$ahkInstallDir' not found after choco install. This is unexpected."
            exit 1
          }

          # 确定 AutoHotkey v2 的主执行文件路径
          # Chocolatey 通常会将 AutoHotkey.exe (64-bit Unicode) 放在安装目录下
          # 或者名为 AutoHotkey64.exe / AutoHotkeyU64.exe 等
          $ahkExeName = "AutoHotkey.exe" # 默认尝试这个
          $ahkExePath = Join-Path $ahkInstallDir $ahkExeName
          if (-not (Test-Path $ahkExePath)) {
              # 尝试查找其他可能的 v2 执行文件名
              $potentialExes = Get-ChildItem -Path $ahkInstallDir -Filter "AutoHotkey*.exe" | Where-Object { $_.Name -notmatch "UIA|WindowSpy|Launcher" } | Sort-Object Name -Descending
              if ($potentialExes.Count -gt 0) {
                  $ahkExePath = $potentialExes[0].FullName
                  $ahkExeName = $potentialExes[0].Name
                  Write-Host "Found AutoHotkey v2 executable as '$ahkExePath'"
              } else {
                  Write-Error "Could not find a suitable AutoHotkey v2 executable in '$ahkInstallDir'."
                  Get-ChildItem -Path $ahkInstallDir -Recurse -Depth 1 | Select-Object FullName
                  exit 1
              }
          } else {
              Write-Host "Using AutoHotkey v2 executable at '$ahkExePath'"
          }

          # 将 AutoHotkey 主目录添加到 PATH，以便运行 ahk 脚本
          Write-Host "Adding AutoHotkey core directory to PATH for this session: $ahkInstallDir"
          $env:PATH = "$ahkInstallDir;" + $env:PATH

          # 运行 install-ahk2exe.ahk 脚本来安装或确认 Ahk2Exe
          $installScriptDir = Join-Path $ahkInstallDir "UX"
          $installScriptName = "install-ahk2exe.ahk"
          $installScriptFullPath = Join-Path $installScriptDir $installScriptName
          $ahk2ExeCompilerDir = Join-Path $ahkInstallDir "Compiler"
          $ahk2ExeFinalPath = Join-Path $ahk2ExeCompilerDir "Ahk2Exe.exe"

          if (Test-Path $installScriptFullPath) {
            Write-Host "Found '$installScriptName'. Running it with '$ahkExeName' to ensure Ahk2Exe is installed..."
            # 使用 & 操作符和完整路径执行
            # 添加 /ErrorStdOut 将 AHK 脚本的错误输出到 stderr，以便 Actions 捕获
            # 切换工作目录到脚本所在目录，以防脚本依赖相对路径
            Push-Location $installScriptDir
            & $ahkExePath /ErrorStdOut $installScriptName # 这里假设脚本不需要额外参数，并且能静默执行
            Pop-Location
            
            Write-Host "Waiting a few seconds for Ahk2Exe installation/download to complete..."
            Start-Sleep -Seconds 20 # 留出足够时间给下载和解压

            if (Test-Path $ahk2ExeFinalPath) {
              Write-Host "Ahk2Exe.exe confirmed/installed at '$ahk2ExeFinalPath'."
            } else {
              Write-Warning "Ahk2Exe.exe NOT found at '$ahk2ExeFinalPath' even after running '$installScriptName'."
              Write-Host "Listing contents of Compiler directory '$ahk2ExeCompilerDir' (if it exists):"
              if (Test-Path $ahk2ExeCompilerDir) { Get-ChildItem -Path $ahk2ExeCompilerDir }
              # 在这里可以考虑是否要失败，或者让后续的 PATH 检查来处理
            }
          } else {
            Write-Warning "'$installScriptFullPath' not found. Ahk2Exe might not be set up by this method."
            Write-Host "Listing contents of UX directory '$installScriptDir' (if it exists):"
            if (Test-Path $installScriptDir) { Get-ChildItem -Path $installScriptDir }
          }

          # 将 Compiler 目录 (Ahk2Exe 所在地) 添加到 PATH
          if (Test-Path $ahk2ExeCompilerDir) {
            Write-Host "Adding AutoHotkey Compiler directory to PATH for this session: $ahk2ExeCompilerDir"
            $env:PATH = "$ahk2ExeCompilerDir;" + $env:PATH
          } else {
            Write-Warning "AutoHotkey Compiler directory '$ahk2ExeCompilerDir' does not exist. Ahk2Exe will likely not be found."
          }

          Write-Host "Updated session PATH: $env:PATH"
          Start-Sleep -Milliseconds 500 # 短暂等待

          # 验证 AutoHotkey.exe (v2)
          Write-Host "Verifying AutoHotkey command after PATH adjustment..."
          if (-not (Get-Command $ahkExeName -ErrorAction SilentlyContinue)) {
            Write-Error "$ahkExeName not found in PATH after PATH adjustment. Current PATH: $env:PATH"
            exit 1
          }
          Write-Host "$ahkExeName found in PATH at: $((Get-Command $ahkExeName).Path)"

          # 验证 Ahk2Exe.exe
          Write-Host "Verifying Ahk2Exe command after PATH adjustment..."
          if (-not (Get-Command Ahk2Exe -ErrorAction SilentlyContinue)) {
            Write-Error "Ahk2Exe.exe not found in PATH after PATH adjustment. Current PATH: $env:PATH"
            Write-Host "Checking common locations for Ahk2Exe.exe:"
            Write-Host "Expected at: $ahk2ExeFinalPath (Exists: $(Test-Path $ahk2ExeFinalPath))"
            exit 1
          }
          Write-Host "Ahk2Exe found in PATH at: $((Get-Command Ahk2Exe).Path)"

      - name: Compile AutoHotkey Script
        id: compile_script
        shell: pwsh
        run: |
          $ahkExtractPath = "AutoHotkey_v2_Files" # 与上面解压路径一致
          $scriptFile = "DoroHelper.ahk"
          $iconFile = "doro.ico"
          $outputExe = "DoroHelper.exe" # 输出的 exe 文件名

          if (-not (Test-Path $scriptFile)) {
            Write-Error "AHK script file '$scriptFile' not found."
            exit 1
          }
          if (-not (Test-Path $iconFile)) {
            Write-Warning "Icon file '$iconFile' not found. Proceeding without custom icon."
            $iconFile = "" # 如果图标不存在，则不使用图标参数
          }

          # 确定用于编译的64位基础二进制文件路径
          # 根据 AutoHotkey v2.0.19.zip 的内容，通常是 AutoHotkey64.exe 或 AutoHotkeyU64.exe
          # 在 AutoHotkey_v2_Files 或 AutoHotkey_v2_Files\UX 目录下
          $baseBinaryName = "AutoHotkey64.exe"
          $baseBinaryPath = Join-Path $PWD $ahkExtractPath $baseBinaryName
          if (-not (Test-Path $baseBinaryPath)) {
              $baseBinaryPath = Join-Path $PWD $ahkExtractPath "UX" $baseBinaryName # 检查 UX 子目录
              if (-not (Test-Path $baseBinaryPath)) {
                  # 如果 AutoHotkey64.exe 未找到，尝试 AutoHotkeyU64.exe
                  $baseBinaryName = "AutoHotkeyU64.exe"
                  $baseBinaryPath = Join-Path $PWD $ahkExtractPath $baseBinaryName
                   if (-not (Test-Path $baseBinaryPath)) {
                        $baseBinaryPath = Join-Path $PWD $ahkExtractPath "UX" $baseBinaryName # 检查 UX 子目录
                        if (-not (Test-Path $baseBinaryPath)) {
                            Write-Error "Could not find a suitable 64-bit base binary (AutoHotkey64.exe or AutoHotkeyU64.exe) in '$ahkExtractPath' or '$($ahkExtractPath)\UX'."
                            Write-Host "Listing contents of ${ahkExtractPath}:"
                            Get-ChildItem -Path (Join-Path $PWD $ahkExtractPath) -Recurse | Select-Object FullName
                            exit 1
                        }
                   }
              }
          }

          Write-Host "Using Ahk2Exe from PATH."
          Write-Host "Script: $scriptFile"
          Write-Host "Output: $outputExe"
          Write-Host "Icon: $iconFile"
          Write-Host "Base Binary for compilation: $baseBinaryPath"

          $compileArgs = @("/in", "`"$scriptFile`"", "/out", "`"$outputExe`"", "/bin", "`"$baseBinaryPath`"", "/cp", "65001") # UTF-8 codepage
          if ($iconFile -and (Test-Path $iconFile)) {
              $compileArgs += @("/icon", "`"$iconFile`"")
          }

          Ahk2Exe.exe $compileArgs

          if (-not (Test-Path $outputExe)) {
            Write-Error "Compilation failed. $outputExe not found."
            exit 1
          }
          Write-Host "$outputExe compiled successfully."
          echo "EXE_NAME=$outputExe" >> $env:GITHUB_OUTPUT

      - name: Determine if Pre-release
        id: prerelease_check
        shell: bash # bash 更易于进行字符串检查
        run: |
          VERSION_TAG="${{ steps.get_version.outputs.VERSION_TAG }}"
          IS_PRERELEASE="false"
          if [[ "$VERSION_TAG" == *beta* ]]; then
            IS_PRERELEASE="true"
          fi
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION_TAG, Is Prerelease: $IS_PRERELEASE"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION_TAG }}
          name: ${{ steps.get_version.outputs.VERSION_TAG }} # Release 标题
          body: |
            Automated release for DoroHelper ${{ steps.get_version.outputs.VERSION_TAG }}
            Compiled from commit ${{ github.sha }}
          draft: false
          prerelease: ${{ steps.prerelease_check.outputs.IS_PRERELEASE }}
          files: |
            ${{ steps.compile_script.outputs.EXE_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
