name: Compile AHK 2.0 and Release

on:
  push:
    tags:
      - "v**"
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List all files in the repository for debugging
        shell: pwsh
        run: |
          Write-Host "--- Listing all files in the repository root ($(Get-Location)) after checkout ---"
          Get-ChildItem -Path (Get-Location) -Recurse | Select-Object FullName, Name, DirectoryName, Mode | Sort-Object FullName
          Write-Host "--- End of repository file listing ---"

      - name: Download and Setup AutoHotkey v2 (using AutoHotkey_H for compiler) # <--- 修改步骤名称
        shell: pwsh
        run: |
          # 尝试下载 AutoHotkey_H 的 V2 版本，作为编译器的基础
          # 查找最新稳定版 AutoHotkey_H for v2 的 URL
          $ahkHRepoOwner = "HotKeyIt"
          $ahkHRepoName = "AutoHotkey_H"
          $ahkHApiURL = "https://api.github.com/repos/$ahkHRepoOwner/$ahkHRepoName/releases/latest"
          $ahkExtractPath = "AutoHotkey_v2_Compiler_Files" # <--- 修改提取路径名称

          Write-Host "Fetching latest AutoHotkey_H v2 release information from $ahkHApiURL"
          try {
              $releaseInfo = Invoke-RestMethod -Uri $ahkHApiURL -Headers @{ Authorization = "token ${{ secrets.GITHUB_TOKEN }}" }
              # 查找包含 "v2" 且是 x64 版本的 zip 或 exe
              $ahkHAsset = $releaseInfo.assets | Where-Object { $_.name -like "*v2*x64*.zip" -or $_.name -like "*v2*x64*.exe" } | Select-Object -First 1
              
              if (-not $ahkHAsset) {
                  Write-Error "Could not find a suitable AutoHotkey_H v2 x64 asset in the latest release."
                  Write-Host "Available assets:"
                  $releaseInfo.assets | Select-Object name, browser_download_url | Format-List
                  exit 1
              }
              $ahkHUrl = $ahkHAsset.browser_download_url
              Write-Host "Found latest AutoHotkey_H v2 x64 at: $ahkHUrl"
          } catch {
              Write-Error "Failed to fetch latest AutoHotkey_H v2 release information: $($_.Exception.Message)"
              exit 1
          }

          if ($ahkHUrl -like "*.zip") {
              Write-Host "Downloading AutoHotkey_H v2 from $ahkHUrl"
              Invoke-WebRequest -Uri $ahkHUrl -OutFile "ahk_h_v2.zip"
              Write-Host "Extracting AutoHotkey_H v2 to $ahkExtractPath"
              Expand-Archive -Path "ahk_h_v2.zip" -DestinationPath $ahkExtractPath -Force
          } elseif ($ahkHUrl -like "*.exe") {
              Write-Host "Downloading AutoHotkey_H v2 standalone exe from $ahkHUrl"
              # 直接下载exe，并确保文件夹存在
              New-Item -ItemType Directory -Force -Path $ahkExtractPath
              Invoke-WebRequest -Uri $ahkHUrl -OutFile (Join-Path $ahkExtractPath "AutoHotkey64.exe") # 假设是AutoHotkey64.exe
          } else {
              Write-Error "Unsupported AutoHotkey_H v2 asset type: $ahkHUrl"
              exit 1
          }


          Write-Host "Listing contents of $ahkExtractPath after extraction:"
          Get-ChildItem -Path $ahkExtractPath -Recurse | Select-Object FullName, Name, DirectoryName | Sort-Object FullName
          Write-Host "--- End of AutoHotkey_H v2 file listing ---"

          # 确保将 AutoHotkey_H 的目录添加到 PATH
          $ahkCompilerPath = Join-Path $PWD $ahkExtractPath
          Write-Host "Adding $ahkCompilerPath to PATH (for AutoHotkey_H compiler)"
          Add-Content $env:GITHUB_PATH "$ahkCompilerPath"

          # 额外验证是否有 AutoHotkey64.exe 或类似的编译器
          if (-not (Test-Path "$ahkCompilerPath\AutoHotkey64.exe") -and `
              -not (Test-Path "$ahkCompilerPath\AutoHotkeyU64.exe")) {
              Write-Warning "Could not find expected AutoHotkey64.exe or AutoHotkeyU64.exe in $ahkCompilerPath. Compilation might fail."
          }

      - name: Download and Setup Ahk2Exe (Latest Dynamic)
        shell: pwsh
        run: |
          $repoOwner = "AutoHotkey"
          $repoName = "Ahk2Exe"
          $apiURL = "https://api.github.com/repos/$repoOwner/$repoName/releases/latest"
          $ahk2ExeExtractPath = "AutoHotkey_Ahk2Exe_Files" 

          Write-Host "Fetching latest Ahk2Exe release information from $apiURL"
          try {
              $releaseInfo = Invoke-RestMethod -Uri $apiURL -Headers @{ Authorization = "token ${{ secrets.GITHUB_TOKEN }}" }
              $ahk2ExeZipAsset = $releaseInfo.assets | Where-Object { $_.name -like "Ahk2Exe*.zip" } | Select-Object -First 1
              
              if (-not $ahk2ExeZipAsset) {
                  Write-Error "Could not find Ahk2Exe.zip asset in the latest release."
                  exit 1
              }
              $ahk2ExeZipUrl = $ahk2ExeZipAsset.browser_download_url
              Write-Host "Found latest Ahk2Exe.zip at: $ahk2ExeZipUrl"
          } catch {
              Write-Error "Failed to fetch latest Ahk2Exe release information: $($_.Exception.Message)"
              exit 1
          }

          Write-Host "Downloading Ahk2Exe from $ahk2ExeZipUrl"
          Invoke-WebRequest -Uri $ahk2ExeZipUrl -OutFile "ahk2exe.zip"
          Write-Host "Extracting Ahk2Exe to $ahk2ExeExtractPath"
          Expand-Archive -Path "ahk2exe.zip" -DestinationPath $ahk2ExeExtractPath -Force

          Write-Host "Listing contents of $ahk2ExeExtractPath after extraction:"
          Get-ChildItem -Path $ahk2ExeExtractPath -Recurse | Select-Object FullName, Name, DirectoryName | Sort-Object FullName
          Write-Host "--- End of Ahk2Exe file listing ---"

          $ahk2ExeBinPath = Join-Path $PWD $ahk2ExeExtractPath 

          if (Test-Path "$ahk2ExeBinPath\Ahk2Exe.exe") {
              Write-Host "Found Ahk2Exe.exe in: $ahk2ExeBinPath"
              Write-Host "Adding $ahk2ExeBinPath to PATH (for Ahk2Exe.exe)"
              Add-Content $env:GITHUB_PATH "$ahk2ExeBinPath"
          } else {
              Write-Error "Ahk2Exe.exe not found in '$ahk2ExeBinPath'. Check the Ahk2Exe file listing above."
              exit 1
          }

      - name: Verify Ahk2Exe in PATH
        shell: pwsh
        run: |
          Write-Host "Verifying Ahk2Exe command in new PowerShell session..."
          if (-not (Get-Command Ahk2Exe -ErrorAction SilentlyContinue)) {
            Write-Error "Ahk2Exe.exe not found in PATH. This is unexpected after previous setup."
            Write-Host "Current PATH: $env:PATH"
            exit 1
          }
          Write-Host "Ahk2Exe found in PATH at: $((Get-Command Ahk2Exe).Path)"

      - name: Test AutoHotkey Interpreter # 这个步骤现在会使用 AutoHotkey_H 解释器
        shell: pwsh
        run: |
          $scriptToTest = "test_compile.ahk"
          $ahkExeName = "AutoHotkey64.exe" # 假设 AutoHotkey_H 提供了这个名称的 exe
          $ahkCompilerExtractPath = "AutoHotkey_v2_Compiler_Files" # <--- 使用新的路径

          $ahkInterpreterPath = Join-Path $PWD $ahkCompilerExtractPath $ahkExeName
          if (-not (Test-Path $ahkInterpreterPath)) {
              $ahkInterpreterPath = Join-Path $PWD $ahkCompilerExtractPath "UX" $ahkExeName 
          }
          # 检查 AutoHotkey_H 是否有其他命名的 exe，例如 "AutoHotkey_H.exe"
          if (-not (Test-Path $ahkInterpreterPath)) {
              $ahkInterpreterPath = Join-Path $PWD $ahkCompilerExtractPath "AutoHotkey_H.exe" 
          }

          if (-not (Test-Path $ahkInterpreterPath)) {
              Write-Error "Could not find AutoHotkey interpreter ($ahkExeName or AutoHotkey_H.exe) for testing in '$ahkCompilerExtractPath'."
              Get-ChildItem -Path (Join-Path $PWD $ahkCompilerExtractPath) -Recurse | Select-Object FullName, Name
              exit 1
          }

          Write-Host "Attempting to run $scriptToTest with $ahkInterpreterPath..."
          $testOutput = (& "$ahkInterpreterPath" "$scriptToTest" 2>&1)
          $testExitCode = $LASTEXITCODE

          Write-Host "--- AutoHotkey Interpreter Test Output ---"
          Write-Host $testOutput
          Write-Host "Interpreter Exit Code: $testExitCode"
          Write-Host "--- End of Interpreter Test Output ---"

          if ($testExitCode -ne 0) {
              Write-Warning "Interpreter test failed with exit code $testExitCode. This might indicate an issue with the script or interpreter setup."
          } else {
              Write-Host "Interpreter test successful."
          }

      - name: Extract Version from AHK script
        id: get_version
        shell: pwsh
        run: |
          $scriptPath = "DoroHelper.ahk" 
          if (-not (Test-Path $scriptPath)) {
            Write-Warning "Script file '$scriptPath' not found for version extraction. Current directory: $(Get-Location)"
            echo "VERSION_TAG=0.0.0" >> $env:GITHUB_OUTPUT 
            exit 0
          }
          $content = Get-Content -Path $scriptPath -Raw
          $match = $content | Select-String -Pattern 'currentVersion\s*:=\s*"([^"]+)"'
          if ($match) {
            $version = $match.Matches[0].Groups[1].Value
            Write-Host "Version found: $version"
            echo "VERSION_TAG=$version" >> $env:GITHUB_OUTPUT
          } else {
            Write-Warning "Version pattern (currentVersion := \"...\") not found in $scriptPath. Using default '0.0.0'."
            echo "VERSION_TAG=0.0.0" >> $env:GITHUB_OUTPUT
          }

      - name: Compile AutoHotkey Script (Test Simple)
        id: compile_script
        shell: pwsh
        run: |
          $ahkCompilerExtractPath = "AutoHotkey_v2_Compiler_Files" # <--- 使用新的路径
          $scriptFile = "test_compile.ahk" 
          $iconFile = "doro.ico" 
          $outputExe = "test_compile.exe" 

          Write-Host "--- Diagnosing Ahk2Exe and Dependencies (Simple Test) ---"
          Write-Host "Attempting to run Ahk2Exe.exe without arguments to get usage info..."
          $ahk2ExeHelpOutput = (Ahk2Exe.exe 2>&1)
          Write-Host "Ahk2Exe.exe no-arg output:"
          Write-Host $ahk2ExeHelpOutput

          if (-not (Test-Path $scriptFile)) {
            Write-Error "AHK script file '$scriptFile' not found at $(Resolve-Path $scriptFile -ErrorAction SilentlyContinue). Current working directory: $(Get-Location)."
            exit 1
          } else {
            Write-Host "AHK script file found: $(Resolve-Path $scriptFile)"
          }

          if (-not (Test-Path $iconFile)) {
            Write-Warning "Icon file '$iconFile' not found at $(Resolve-Path $iconFile -ErrorAction SilentlyContinue). Proceeding without custom icon. Current working directory: $(Get-Location)."
            $iconFile = "" 
          } else {
            Write-Host "Icon file found: $(Resolve-Path $iconFile)"
          }

          Write-Host "Listing contents of current working directory ($(Get-Location)):"
          Get-ChildItem -Path (Get-Location) -Recurse -Depth 1 | Select-Object FullName, Name, DirectoryName, Mode | Sort-Object FullName
          Write-Host "--- End of current working directory listing ---"

          # 寻找 AutoHotkey_H 提供的 64 位编译器
          $baseBinaryName = "AutoHotkey64.exe" # 优先找这个
          $baseBinaryPath = Join-Path $PWD $ahkCompilerExtractPath $baseBinaryName
          if (-not (Test-Path $baseBinaryPath)) {
              $baseBinaryName = "AutoHotkey_H.exe" # 其次找这个
              $baseBinaryPath = Join-Path $PWD $ahkCompilerExtractPath $baseBinaryName
          }
          if (-not (Test-Path $baseBinaryPath)) {
              Write-Error "Could not find a suitable 64-bit base binary (AutoHotkey64.exe or AutoHotkey_H.exe) in '$ahkCompilerExtractPath'."
              Write-Host "Listing contents of ${ahkCompilerExtractPath}:"
              Get-ChildItem -Path (Join-Path $PWD $ahkCompilerExtractPath) -Recurse | Select-Object FullName
              exit 1
          }

          Write-Host "Using Ahk2Exe from PATH."
          Write-Host "Script: $scriptFile"
          Write-Host "Output: $outputExe"
          Write-Host "Icon: $iconFile"
          Write-Host "Base Binary for compilation: $baseBinaryPath"

          $compileArgs = @("/in", "`"$scriptFile`"", "/out", "`"$outputExe`"", "/bin", "`"$baseBinaryPath`"", "/cp", "65001", "/debug") 
          if ($iconFile -and (Test-Path $iconFile)) {
              $compileArgs += @("/icon", "`"$iconFile`"")
          }

          Write-Host "Attempting to compile with Ahk2Exe.exe..."
          Write-Host "Compilation Arguments: $($compileArgs -join ' ')" 
          $ahk2ExeOutput = (Ahk2Exe.exe $compileArgs 2>&1) 
          $ahk2ExeExitCode = $LASTEXITCODE 

          Write-Host "--- Ahk2Exe Output Start (Actual Compilation) ---"
          Write-Host $ahk2ExeOutput
          Write-Host "--- Ahk2Exe Output End (Actual Compilation) ---"
          Write-Host "Ahk2Exe Exit Code: $ahk2ExeExitCode" 

          if ($ahk2ExeExitCode -ne 0) {
            Write-Error "Compilation failed with exit code $ahk2ExeExitCode. $outputExe not found. See Ahk2Exe output above for details."
            exit 1
          }
          Write-Host "$outputExe compiled successfully."
          echo "EXE_NAME=$outputExe" >> $env:GITHUB_OUTPUT

      - name: Determine if Pre-release
        id: prerelease_check
        shell: bash
        run: |
          VERSION_TAG="${{ steps.get_version.outputs.VERSION_TAG }}"
          IS_PRERELEASE="false"
          if [[ "$VERSION_TAG" == *beta* ]]; then
            IS_PRERELEASE="true"
          fi
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION_TAG, Is Prerelease: $IS_PRERELEASE"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION_TAG }}
          name: ${{ steps.get_version.outputs.VERSION_TAG }}
          body: |
            Automated release for DoroHelper ${{ steps.get_version.outputs.VERSION_TAG }}
            Compiled from commit ${{ github.sha }}
          draft: false
          prerelease: ${{ steps.prerelease_check.outputs.IS_PRERELEASE }}
          files: |
            test_compile.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
