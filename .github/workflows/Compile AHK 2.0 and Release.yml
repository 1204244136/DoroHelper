name: Compile AHK 2.0 and Release

on:
  push:
    tags:
      - "v**"
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest # AutoHotkey 和 Ahk2Exe 在 Windows 上运行
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install AutoHotkey v2 and Setup Ahk2Exe
        shell: pwsh
        run: |
          Write-Host "Attempting to uninstall potentially conflicting AutoHotkey versions to ensure a clean slate..."
          # It's okay if these fail if the packages aren't installed. The `|| Write-Warning` handles that.
          choco uninstall autohotkey.install -y --remove-dependencies -nfy || Write-Warning "Uninstall of autohotkey.install skipped or failed, continuing..."
          choco uninstall autohotkey.v1 -y --remove-dependencies -nfy      || Write-Warning "Uninstall of autohotkey.v1 skipped or failed, continuing..."
          # We will reinstall 'autohotkey', so try uninstalling it first to get a cleaner state
          choco uninstall autohotkey -y --remove-dependencies -nfy         || Write-Warning "Uninstall of autohotkey (meta) skipped or failed, continuing..."

          $ahkInstallDirRoot = "$env:ProgramFiles\AutoHotkey"
          if (Test-Path $ahkInstallDirRoot) {
            Write-Host "Removing existing AutoHotkey installation directory: $ahkInstallDirRoot to ensure a clean install."
            Remove-Item -Recurse -Force $ahkInstallDirRoot -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 5 # Allow time for file system operations
          }

          Write-Host "Installing AutoHotkey (should default to v2) via Chocolatey..."
          # Using the main 'autohotkey' package, which should provide v2
          choco install autohotkey -y --force --no-progress

          $ahkInstallDir = "$env:ProgramFiles\AutoHotkey" 
          Write-Host "AutoHotkey nominal installation directory: $ahkInstallDir"

          if (-not (Test-Path $ahkInstallDir)) {
            Write-Error "AutoHotkey installation directory '$ahkInstallDir' not found after choco install. This is unexpected."
            exit 1
          }

          Write-Host "Listing all EXE files in AutoHotkey installation directory '$ahkInstallDir' with version info:"
          Get-ChildItem -Path $ahkInstallDir -Filter "*.exe" | ForEach-Object {
            $versionInfo = "N/A"
            try { $versionInfo = $_.VersionInfo.ProductVersion } catch {}
            [PSCustomObject]@{
                Name = $_.Name
                FullName = $_.FullName
                Length = $_.Length
                ProductVersion = $versionInfo
                LastWriteTime = $_.LastWriteTime
            }
          } | Format-Table -AutoSize

          # Find a suitable AutoHotkey v2 executable
          $ahkExePathToUse = ""
          # Order of preference for v2 executables - explicitly look for v2 indicators.
          # Chocolatey package 'autohotkey' might place AutoHotkey64.exe as v2
          $v2ExeCandidates = Get-ChildItem -Path $ahkInstallDir -Filter "AutoHotkey*.exe" | Sort-Object Name

          Write-Host "Evaluating potential AutoHotkey executables:"
          foreach ($exeFile in $v2ExeCandidates) {
              $currentTestPath = $exeFile.FullName
              Write-Host "Checking candidate: '$currentTestPath'"
              $fileProductVersion = ""
              try {
                  $fileProductVersion = (Get-Item $currentTestPath).VersionInfo.ProductVersion
              } catch {
                  Write-Warning "Could not retrieve ProductVersion for '$currentTestPath'."
                  Continue
              }

              Write-Host "ProductVersion for '$currentTestPath' is '$fileProductVersion'."
              # AutoHotkey v2.x versions usually start with "2."
              if ($fileProductVersion -and $fileProductVersion.StartsWith("2.")) {
                  Write-Host "'$currentTestPath' IS AutoHotkey v2 (ProductVersion: $fileProductVersion)."
                  # Prefer executables with "64" in the name if multiple v2 found, or shorter names.
                  if (-not $ahkExePathToUse -or ($exeFile.Name -match "64" -and $ahkExePathToUse -notmatch "64") -or ($exeFile.Name.Length -lt (Split-Path $ahkExePathToUse -Leaf).Length)) {
                     $ahkExePathToUse = $currentTestPath
                     Write-Host "Selected '$ahkExePathToUse' as the current best v2 candidate."
                  }
              } else {
                  Write-Warning "'$currentTestPath' (ProductVersion: $fileProductVersion) does NOT appear to be a v2 executable. Current interpreter might be v1 if this is AutoHotkey.exe."
              }
          }

          if (-not $ahkExePathToUse) {
              Write-Error "Could not find a confirmed AutoHotkey v2 executable in '$ahkInstallDir' after checking all candidates. Please review the EXE listing above."
              exit 1
          }
          Write-Host "DEFINITIVELY Using AutoHotkey v2 executable: '$ahkExePathToUse'"

          # Add AutoHotkey main directory (of the chosen executable) to PATH
          $chosenAhkDir = Split-Path $ahkExePathToUse -Parent
          Write-Host "Adding AutoHotkey directory '$chosenAhkDir' (containing the chosen v2 exe) to PATH for this session."
          $env:PATH = "$chosenAhkDir;" + $env:PATH

          # Run install-ahk2exe.ahk script
          # The UX directory is typically relative to the *root* of the AHK installation,
          # not necessarily the same directory as a specific AHK executable (e.g. if v2 is in a subfolder).
          # Assuming $ahkInstallDir is the root (e.g., C:\Program Files\AutoHotkey)
          $installScriptDir = Join-Path $ahkInstallDir "UX"
          $installScriptName = "install-ahk2exe.ahk"
          $installScriptFullPath = Join-Path $installScriptDir $installScriptName

          $ahk2ExeCompilerDir = Join-Path $ahkInstallDir "Compiler" # Standard expected location
          $ahk2ExeFinalPath = Join-Path $ahk2ExeCompilerDir "Ahk2Exe.exe"

          if (Test-Path $installScriptFullPath) {
            Write-Host "Found '$installScriptName'. Running it with the selected v2 executable '$ahkExePathToUse' to ensure Ahk2Exe is installed..."
            # Ensure working directory is where the script is, if it has relative includes
            Push-Location $installScriptDir
            & $ahkExePathToUse /ErrorStdOut $installScriptName # Run the v2 script with the v2 executable
            $exitCode = $LASTEXITCODE
            Pop-Location
            
            if ($exitCode -ne 0) {
                Write-Warning "'$installScriptName' execution may have failed with exit code $exitCode. Check logs for errors from the script itself (stdout/stderr)."
                # Continue, as it might create the folder structure anyway or partially succeed
            } else {
                Write-Host "'$installScriptName' executed, exit code $exitCode (0 usually means success)."
            }

            Write-Host "Waiting briefly for Ahk2Exe installation/download to complete..."
            Start-Sleep -Seconds 25 # Increased sleep time

            if (Test-Path $ahk2ExeFinalPath) {
              Write-Host "Ahk2Exe.exe CONFIRMED at '$ahk2ExeFinalPath'."
            } else {
              Write-Error "Ahk2Exe.exe was NOT found at '$ahk2ExeFinalPath' after running '$installScriptName'."
              Write-Host "Listing contents of expected Compiler directory '$ahk2ExeCompilerDir' (if it exists):"
              if (Test-Path $ahk2ExeCompilerDir) { Get-ChildItem -Path $ahk2ExeCompilerDir -Recurse } else { Write-Host "Directory $ahk2ExeCompilerDir does not exist."}
              Write-Host "Listing contents of UX directory '$installScriptDir' (if it exists):"
              if (Test-Path $installScriptDir) { Get-ChildItem -Path $installScriptDir -Recurse } else { Write-Host "Directory $installScriptDir does not exist."}
              exit 1 # Fail the job if Ahk2Exe isn't found
            }
          } else {
            Write-Error "'$installScriptFullPath' NOT found. Cannot setup Ahk2Exe. This script is essential."
            Write-Host "Listing contents of expected UX directory '$installScriptDir' (if it exists):"
            if (Test-Path $installScriptDir) { Get-ChildItem -Path $installScriptDir -Recurse } else { Write-Host "Directory $installScriptDir does not exist."}
            Write-Host "Listing contents of AHK root directory '$ahkInstallDir' (if it exists):"
            if (Test-Path $ahkInstallDir) { Get-ChildItem -Path $ahkInstallDir -Recurse -Depth 1} else { Write-Host "Directory $ahkInstallDir does not exist."}
            exit 1 # Fail the job
          }

          # Add Compiler directory to PATH if it exists and contains Ahk2Exe.exe
          if (Test-Path $ahk2ExeFinalPath) {
            Write-Host "Adding AutoHotkey Compiler directory '$ahk2ExeCompilerDir' to PATH for this session."
            $env:PATH = "$ahk2ExeCompilerDir;" + $env:PATH
          } else {
            Write-Warning "AutoHotkey Compiler directory '$ahk2ExeCompilerDir' or Ahk2Exe.exe missing. Ahk2Exe will likely not be found in PATH."
            # This should have been caught above, but as a safeguard.
          }

          Write-Host "Final session PATH: $env:PATH"
          Start-Sleep -Milliseconds 500

          # Verify AutoHotkey command (the one we chose, by its name)
          $chosenAhkExeName = Split-Path $ahkExePathToUse -Leaf
          Write-Host "Verifying selected AutoHotkey command '$chosenAhkExeName' is in PATH..."
          if (-not (Get-Command $chosenAhkExeName -ErrorAction SilentlyContinue)) {
            Write-Error "$chosenAhkExeName not found using Get-Command after PATH adjustment. Current PATH: $env:PATH"
            exit 1
          }
          $ahkCmdInfo = Get-Command $chosenAhkExeName
          Write-Host "$chosenAhkExeName found via Get-Command at: $($ahkCmdInfo.Source) (Version: $($ahkCmdInfo.Version))"

          # Verify Ahk2Exe.exe
          Write-Host "Verifying Ahk2Exe command is in PATH..."
          if (-not (Get-Command Ahk2Exe -ErrorAction SilentlyContinue)) {
            Write-Error "Ahk2Exe.exe not found using Get-Command after PATH adjustment. Current PATH: $env:PATH"
            Write-Host "Re-checking expected location: $ahk2ExeFinalPath (Exists: $(Test-Path $ahk2ExeFinalPath))"
            exit 1
          }
          $ahk2ExeCmdInfo = Get-Command Ahk2Exe
          Write-Host "Ahk2Exe found via Get-Command at: $($ahk2ExeCmdInfo.Source) (Version: $($ahk2ExeCmdInfo.Version))"

      - name: Compile AutoHotkey Script
        id: compile_script
        shell: pwsh
        run: |
          $ahkExtractPath = "AutoHotkey_v2_Files" # 与上面解压路径一致
          $scriptFile = "DoroHelper.ahk"
          $iconFile = "doro.ico"
          $outputExe = "DoroHelper.exe" # 输出的 exe 文件名

          if (-not (Test-Path $scriptFile)) {
            Write-Error "AHK script file '$scriptFile' not found."
            exit 1
          }
          if (-not (Test-Path $iconFile)) {
            Write-Warning "Icon file '$iconFile' not found. Proceeding without custom icon."
            $iconFile = "" # 如果图标不存在，则不使用图标参数
          }

          # 确定用于编译的64位基础二进制文件路径
          # 根据 AutoHotkey v2.0.19.zip 的内容，通常是 AutoHotkey64.exe 或 AutoHotkeyU64.exe
          # 在 AutoHotkey_v2_Files 或 AutoHotkey_v2_Files\UX 目录下
          $baseBinaryName = "AutoHotkey64.exe"
          $baseBinaryPath = Join-Path $PWD $ahkExtractPath $baseBinaryName
          if (-not (Test-Path $baseBinaryPath)) {
              $baseBinaryPath = Join-Path $PWD $ahkExtractPath "UX" $baseBinaryName # 检查 UX 子目录
              if (-not (Test-Path $baseBinaryPath)) {
                  # 如果 AutoHotkey64.exe 未找到，尝试 AutoHotkeyU64.exe
                  $baseBinaryName = "AutoHotkeyU64.exe"
                  $baseBinaryPath = Join-Path $PWD $ahkExtractPath $baseBinaryName
                   if (-not (Test-Path $baseBinaryPath)) {
                        $baseBinaryPath = Join-Path $PWD $ahkExtractPath "UX" $baseBinaryName # 检查 UX 子目录
                        if (-not (Test-Path $baseBinaryPath)) {
                            Write-Error "Could not find a suitable 64-bit base binary (AutoHotkey64.exe or AutoHotkeyU64.exe) in '$ahkExtractPath' or '$($ahkExtractPath)\UX'."
                            Write-Host "Listing contents of ${ahkExtractPath}:"
                            Get-ChildItem -Path (Join-Path $PWD $ahkExtractPath) -Recurse | Select-Object FullName
                            exit 1
                        }
                   }
              }
          }

          Write-Host "Using Ahk2Exe from PATH."
          Write-Host "Script: $scriptFile"
          Write-Host "Output: $outputExe"
          Write-Host "Icon: $iconFile"
          Write-Host "Base Binary for compilation: $baseBinaryPath"

          $compileArgs = @("/in", "`"$scriptFile`"", "/out", "`"$outputExe`"", "/bin", "`"$baseBinaryPath`"", "/cp", "65001") # UTF-8 codepage
          if ($iconFile -and (Test-Path $iconFile)) {
              $compileArgs += @("/icon", "`"$iconFile`"")
          }

          Ahk2Exe.exe $compileArgs

          if (-not (Test-Path $outputExe)) {
            Write-Error "Compilation failed. $outputExe not found."
            exit 1
          }
          Write-Host "$outputExe compiled successfully."
          echo "EXE_NAME=$outputExe" >> $env:GITHUB_OUTPUT

      - name: Determine if Pre-release
        id: prerelease_check
        shell: bash # bash 更易于进行字符串检查
        run: |
          VERSION_TAG="${{ steps.get_version.outputs.VERSION_TAG }}"
          IS_PRERELEASE="false"
          if [[ "$VERSION_TAG" == *beta* ]]; then
            IS_PRERELEASE="true"
          fi
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION_TAG, Is Prerelease: $IS_PRERELEASE"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION_TAG }}
          name: ${{ steps.get_version.outputs.VERSION_TAG }} # Release 标题
          body: |
            Automated release for DoroHelper ${{ steps.get_version.outputs.VERSION_TAG }}
            Compiled from commit ${{ github.sha }}
          draft: false
          prerelease: ${{ steps.prerelease_check.outputs.IS_PRERELEASE }}
          files: |
            ${{ steps.compile_script.outputs.EXE_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
