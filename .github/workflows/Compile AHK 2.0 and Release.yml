name: Compile AHK 2.0 and Release

on:
  push:
    tags:
      - "v**"
  workflow_dispatch:

jobs:
  build_and_release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install AutoHotkey v2 via Chocolatey
        id: install_ahk
        run: |
          # 确保 Chocolatey 安装的是 AutoHotkey v2
          choco install autohotkey --version 2.0.19 -y # 使用你确认的最新稳定版本号，例如 2.0.19

          # 获取 AutoHotkey.exe 的实际安装路径，并将其添加到 PATH
          # 注意：Chocolatey 安装后，AutoHotkey.exe 可能直接在 C:\Program Files\AutoHotkey
          # 或者在 C:\Program Files\AutoHotkey\AutoHotkey 这样的子目录里
          # 我们需要找到实际的可执行文件路径
          $ahk_exe_path = (Get-Command AutoHotkey.exe -ErrorAction SilentlyContinue).Path

          if ($null -eq $ahk_exe_path) {
              # 如果 Get-Command 没找到，尝试在常见的 Chocolatey 部署路径中查找
              $possible_paths = @(
                  "C:\Program Files\AutoHotkey\AutoHotkey.exe",
                  "C:\Program Files\AutoHotkey\AutoHotkey_2.0.19\AutoHotkey.exe" # 考虑版本号子目录
              )
              foreach ($p in $possible_paths) {
                  if (Test-Path $p) {
                      $ahk_exe_path = $p
                      break
                  }
              }
          }

          if ($null -eq $ahk_exe_path) {
              Write-Error "Error: AutoHotkey.exe not found after Chocolatey installation. Please check the installation path."
              exit 1
          }

          $ahk_install_dir = Split-Path -Path $ahk_exe_path -Parent

          # 将 AutoHotkey 安装目录添加到当前 shell 会话的 PATH
          # GITHUB_PATH 环境变量是 GitHub Actions 推荐的方式，可以永久性地将目录添加到后续步骤的 PATH
          echo "$ahk_install_dir" | Out-File -FilePath $env:GITHUB_PATH -Append

          Write-Host "AutoHotkey installation directory added to PATH: $ahk_install_dir"

          # 现在应该可以在 PATH 中找到 AutoHotkey.exe 了
          AutoHotkey.exe -v

          # 找到 Compiler.ahk 的路径并添加到环境变量，以便后续使用
          # Compiler.ahk 通常在 AutoHotkey.exe 所在的目录中
          $compiler_script_path = Join-Path $ahk_install_dir "Compiler.ahk"
          if (-not (Test-Path $compiler_script_path)) {
             Write-Host "Warning: Compiler.ahk not found directly in $ahk_install_dir. Attempting to search common subdirectories."
             # 某些安装可能将其放在 "Compiler" 或 "Lib" 子目录中
             $possible_compiler_dirs = @(
                Join-Path $ahk_install_dir "Compiler"
                Join-Path $ahk_install_dir "Lib"
                # 根据 AutoHotkey v2 的实际安装结构调整
             )
             foreach ($dir in $possible_compiler_dirs) {
                $temp_compiler_path = Join-Path $dir "Compiler.ahk"
                if (Test-Path $temp_compiler_path) {
                   $compiler_script_path = $temp_compiler_path
                   break
                }
             }
          }

          Write-Host "AutoHotkey Compiler.ahk path: $compiler_script_path"
          if (-not (Test-Path $compiler_script_path)) {
            Write-Error "Error: AutoHotkey v2 Compiler.ahk could not be located after installation."
            exit 1
          }
          echo "AHK_COMPILER_PATH=$compiler_script_path" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Get currentVersion from AHK script
        id: get_version
        run: |
          $script_file = "DoroHelper.ahk"
          if (-not (Test-Path $script_file)) {
              Write-Error "Error: AutoHotkey script '$script_file' not found."
              exit 1
          }

          $current_version = $null
          $is_prerelease = "false"

          Get-Content $script_file | ForEach-Object {
              $line = $_
              $match = [regex]::Match($line, '^\s*currentVersion\s*:=\s*"([^"]+)"')
              if ($match.Success) {
                  $current_version = $match.Groups[1].Value
                  Write-Host "Extracted currentVersion: $current_version"
                  
                  if ($current_version -like "*beta*" -or $current_version -like "*alpha*" -or $current_version -like "*rc*") {
                      $is_prerelease = "true"
                  }
                  break
              }
          }

          if ($current_version -ne $null) {
              echo "version=$current_version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              echo "is_prerelease=$is_prerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
              Write-Error "Error: Could not find 'currentVersion := \"...\"' in $script_file."
              exit 1
          }

      - name: Compile AutoHotkey script
        id: compile_script
        run: |
          $script_name = "DoroHelper.ahk"
          $icon_name = "doro.ico"
          $output_exe_name = "${{ steps.get_version.outputs.version }}_64bit.exe"

          if (-not (Test-Path $script_name)) {
              Write-Error "Error: AutoHotkey script '$script_name' not found."
              exit 1
          }
          if (-not (Test-Path $icon_name)) {
              Write-Error "Error: Icon file '$icon_name' not found."
              exit 1
          }

          $compiler_path = "${{ steps.install_ahk.outputs.AHK_COMPILER_PATH }}"
          if (-not (Test-Path $compiler_path)) {
              Write-Error "Error: AutoHotkey v2 Compiler.ahk not found at $compiler_path. Please ensure AutoHotkey v2 was correctly installed and its Compiler.ahk path was extracted."
              exit 1
          }

          $output_dir = "build"
          if (-not (Test-Path $output_dir)) {
              New-Item -ItemType Directory -Path $output_dir
          }

          $full_output_path = Join-Path $output_dir $output_exe_name
          $full_script_path = Join-Path $PWD $script_name
          $full_icon_path = Join-Path $PWD $icon_name

          Write-Host "Compiling script: $full_script_path"
          Write-Host "Output EXE: $full_output_path"
          Write-Host "Icon: $full_icon_path"

          AutoHotkey.exe "$compiler_path" /in "$full_script_path" /out "$full_output_path" /icon "$full_icon_path" /64

          echo "compiled_exe_path=$full_output_path" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          echo "compiled_exe_name=$output_exe_name" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ steps.compile_script.outputs.compiled_exe_path }}
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          body: |
            ## 🎉 新版本发布：${{ steps.get_version.outputs.version }}

            此版本包含以下编译文件：
            - ${{ steps.compile_script.outputs.compiled_exe_name }}

            感谢您的使用！
          draft: false
          prerelease: ${{ steps.get_version.outputs.is_prerelease }}
