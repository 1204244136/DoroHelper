name: Compile AHK 2.0 and Release

on:
  push:
    tags:
      - "v**"
  workflow_dispatch:

jobs:
  build_and_release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install AutoHotkey v2 via Chocolatey
        id: install_ahk # 修正了这一行的缩进，使其与 name、run 等同级
        run: |
          choco install autohotkey --version 2.0.12 -y # 替换为AutoHotkey v2的最新稳定版本号
          AutoHotkey.exe -v
          $ahk_install_path = (Get-Command AutoHotkey.exe).Path | Split-Path -Parent
          $compiler_script_path = Join-Path $ahk_install_path "Compiler.ahk"
          Write-Host "AutoHotkey Compiler.ahk path: $compiler_script_path"
          echo "AHK_COMPILER_PATH=$compiler_script_path" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Get currentVersion from AHK script
        id: get_version
        run: |
          $script_file = "DoroHelper.ahk"
          if (-not (Test-Path $script_file)) {
              Write-Error "Error: AutoHotkey script '$script_file' not found."
              exit 1
          }

          $current_version = $null
          $is_prerelease = "false"

          Get-Content $script_file | ForEach-Object {
              $line = $_
              $match = [regex]::Match($line, '^\s*currentVersion\s*:=\s*"([^"]+)"')
              if ($match.Success) {
                  $current_version = $match.Groups[1].Value
                  Write-Host "Extracted currentVersion: $current_version"
                  
                  if ($current_version -like "*beta*" -or $current_version -like "*alpha*" -or $current_version -like "*rc*") {
                      $is_prerelease = "true"
                  }
                  break
              }
          }

          if ($current_version -ne $null) {
              echo "version=$current_version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              echo "is_prerelease=$is_prerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
              Write-Error "Error: Could not find 'currentVersion := \"...\"' in $script_file."
              exit 1
          }

      - name: Compile AutoHotkey script
        id: compile_script
        run: |
          $script_name = "DoroHelper.ahk"
          $icon_name = "doro.ico"
          $output_exe_name = "${{ steps.get_version.outputs.version }}_64bit.exe"

          if (-not (Test-Path $script_name)) {
              Write-Error "Error: AutoHotkey script '$script_name' not found."
              exit 1
          }
          if (-not (Test-Path $icon_name)) {
              Write-Error "Error: Icon file '$icon_name' not found."
              exit 1
          }

          # 从上一步的输出中获取 Compiler.ahk 的路径
          $compiler_path = "${{ steps.install_ahk.outputs.AHK_COMPILER_PATH }}"
          if (-not (Test-Path $compiler_path)) {
              Write-Error "Error: AutoHotkey v2 Compiler.ahk not found at $compiler_path. Please ensure AutoHotkey v2 was correctly installed."
              exit 1
          }

          $output_dir = "build"
          if (-not (Test-Path $output_dir)) {
              New-Item -ItemType Directory -Path $output_dir
          }

          $full_output_path = Join-Path $output_dir $output_exe_name
          $full_script_path = Join-Path $PWD $script_name
          $full_icon_path = Join-Path $PWD $icon_name

          Write-Host "Compiling script: $full_script_path"
          Write-Host "Output EXE: $full_output_path"
          Write-Host "Icon: $full_icon_path"

          AutoHotkey.exe "$compiler_path" /in "$full_script_path" /out "$full_output_path" /icon "$full_icon_path" /64

          echo "compiled_exe_path=$full_output_path" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          echo "compiled_exe_name=$output_exe_name" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ steps.compile_script.outputs.compiled_exe_path }}
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          body: |
            ## 🎉 新版本发布：${{ steps.get_version.outputs.version }}

            此版本包含以下编译文件：
            - ${{ steps.compile_script.outputs.compiled_exe_name }}

            感谢您的使用！
          draft: false
          prerelease: ${{ steps.get_version.outputs.is_prerelease }}
