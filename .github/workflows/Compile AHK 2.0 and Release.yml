name: Compile AHK 2.0 and Release

on:
  push:
    tags:
      - "v**"
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 使用 CCCC-L/Action-Ahk2Exe 编译 AutoHotkey v2 脚本
      - name: Compile AutoHotkey V2 Script
        uses: CCCC-L/Action-Ahk2Exe@main
        with:
          in: DoroHelper.ahk # 假设您的主脚本文件是 DoroHelper.ahk
          out: DoroHelper.exe # 输出的可执行文件名称
          base: 64 # 编译为 64 位应用程序，如果需要 32 位可以改为 32

      # !!! 新增步骤：验证编译后的 EXE 文件是否存在 !!!
      - name: Verify Compiled Executable Exists
        shell: pwsh
        run: |
          $expectedExePath = "DoroHelper.exe"
          Write-Host "Checking for compiled executable at: $(Resolve-Path $expectedExePath -ErrorAction SilentlyContinue)"
          if (-not (Test-Path $expectedExePath)) {
            Write-Error "Error: Compiled executable '$expectedExePath' was not found after compilation."
            Write-Host "Listing contents of current directory for debugging:"
            Get-ChildItem -Path (Get-Location) -Recurse -Depth 2 | Select-Object FullName, Name, DirectoryName, Mode | Sort-Object FullName
            exit 1 # 显式地使当前步骤失败
          }
          Write-Host "Compiled executable '$expectedExePath' found. Proceeding with release."

      - name: Extract Version from AHK script
        id: get_version
        shell: pwsh
        run: |
          $scriptPath = "DoroHelper.ahk" # 确保这里是您的主脚本文件路径
          if (-not (Test-Path $scriptPath)) {
            Write-Warning "Script file '$scriptPath' not found for version extraction. Current directory: $(Get-Location)"
            echo "VERSION_TAG=0.0.0" >> $env:GITHUB_OUTPUT 
            exit 0
          }
          $content = Get-Content -Path $scriptPath -Raw
          $match = $content | Select-String -Pattern 'currentVersion\s*:=\s*"([^"]+)"'
          if ($match) {
            $version = $match.Matches[0].Groups[1].Value
            Write-Host "Version found: $version"
            echo "VERSION_TAG=$version" >> $env:GITHUB_OUTPUT
          } else {
            Write-Warning "Version pattern (currentVersion := \"...\") not found in $scriptPath. Using default '0.0.0'."
            echo "VERSION_TAG=0.0.0" >> $env:GITHUB_OUTPUT
          }

      - name: Determine if Pre-release
        id: prerelease_check
        shell: bash
        run: |
          VERSION_TAG="${{ steps.get_version.outputs.VERSION_TAG }}"
          IS_PRERELEASE="false"
          if [[ "$VERSION_TAG" == *beta* ]]; then
            IS_PRERELEASE="true"
          fi
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION_TAG, Is Prerelease: $IS_PRERELEASE"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION_TAG }}
          name: ${{ steps.get_version.outputs.VERSION_TAG }}
          body: |
            Automated release for DoroHelper ${{ steps.get_version.outputs.VERSION_TAG }}
            Compiled from commit ${{ github.sha }}
          draft: false
          prerelease: ${{ steps.prerelease_check.outputs.IS_PRERELEASE }}
          files: |
            DoroHelper.exe # 确保这里与 Compile AutoHotkey V2 Script 步骤的 'out' 参数一致
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
